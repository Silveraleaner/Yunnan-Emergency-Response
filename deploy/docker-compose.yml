version: '3.8'

networks:
  emergency-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

services:
  postgresql:
    build: ./postgresql
    container_name: emergency-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: spatial_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ZAQ12wsx581!
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres/:/docker-entrypoint-initdb.d/
    networks:
      - emergency-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: emergency-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ZAQ12wsx581!
    command: redis-server --requirepass ZAQ12wsx581!
    volumes:
      - redis-data:/data
    networks:
      - emergency-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: emergency-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ZAQ12wsx581!
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - emergency-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5